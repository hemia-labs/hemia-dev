name: Build and deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sin `version`: la toma de "packageManager" en package.json (fuente única)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      # standalone no incluye estáticos ni public: se copian dentro del bundle
      - name: Assemble standalone bundle
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
          cp ecosystem.config.cjs apps/web/.next/standalone/ecosystem.config.cjs

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p ${{ secrets.VPS_APP_DIR }}
            rm -rf ${{ secrets.VPS_APP_DIR }}/apps ${{ secrets.VPS_APP_DIR }}/node_modules

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "apps/web/.next/standalone/."
          target: ${{ secrets.VPS_APP_DIR }}
          strip_components: 4

      - name: Restart with PM2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22 || true

            cd ${{ secrets.VPS_APP_DIR }}
            pm2 restart hemia-dev-web --update-env || pm2 start ecosystem.config.cjs
            pm2 save
